<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plank Timer</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="app.js"></script>
</head>
<body>
    <div class="app">
        <!-- Auth Header -->
        <div id="auth-container" class="auth-container">
            <div id="auth-loading" class="auth-loading">Loading...</div>
            <div id="auth-logged-out" class="auth-state" style="display: none;">
                <button id="login-btn" class="login-btn">Sign in with Google</button>
            </div>
            <div id="auth-logged-in" class="auth-state" style="display: none;">
                <span id="user-name" class="user-name"></span>
                <button id="logout-btn" class="logout-btn">Sign out</button>
            </div>
        </div>

        <nav class="tabs">
            <button class="tab active" data-tab="timer">Timer</button>
            <button class="tab" data-tab="history">History</button>
            <button class="tab" data-tab="graphs">Graphs</button>
        </nav>

        <main class="content">
            <!-- Timer Tab -->
            <section id="timer" class="tab-content active">
                <div class="timer-display">
                    <span id="main-timer">00:00.0</span>
                </div>

                <button id="start-btn" class="start-btn">Start</button>

                <div class="participants">
                    <!-- Participants loaded dynamically from Firestore config -->
                </div>
            </section>

            <!-- History Tab -->
            <section id="history" class="tab-content">
                <div class="calendar-container">
                    <div class="calendar-header">
                        <button id="prev-month" class="cal-nav">&lt;</button>
                        <span id="current-month"></span>
                        <button id="next-month" class="cal-nav">&gt;</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>Mon</span>
                        <span>Tue</span>
                        <span>Wed</span>
                        <span>Thu</span>
                        <span>Fri</span>
                        <span>Sat</span>
                        <span>Sun</span>
                    </div>
                    <div id="calendar-days" class="calendar-days"></div>
                </div>
                <div id="day-details" class="day-details">
                    <h3 id="selected-date"></h3>
                    <div id="rounds-list"></div>
                </div>
            </section>

            <!-- Graphs Tab -->
            <section id="graphs" class="tab-content">
                <div class="graphs-container">
                    <!-- Graph cards loaded dynamically from Firestore config -->
                </div>
            </section>
        </main>
    </div>

    <footer class="footer">
        Plank app by Lidia and Alex
    </footer>

    <!-- Debug Panel -->
    <button id="debug-toggle" class="debug-toggle">Debug: OFF</button>
    <div id="debug-panel" class="debug-panel hidden">
        <div class="debug-header">
            <span>Debug Log</span>
            <button id="debug-clear">Clear</button>
        </div>
        <div id="debug-log"></div>
    </div>
    <script>
    (function() {
        var isOn = false;
        var toggle = document.getElementById('debug-toggle');
        var panel = document.getElementById('debug-panel');
        var logEl = document.getElementById('debug-log');
        var clearBtn = document.getElementById('debug-clear');

        function addEntry(type, msg) {
            var time = new Date().toLocaleTimeString();
            var entry = document.createElement('div');
            entry.className = 'debug-entry ' + type;
            entry.textContent = '[' + time + '] ' + msg;
            logEl.appendChild(entry);
            logEl.scrollTop = logEl.scrollHeight;
        }

        toggle.addEventListener('click', function() {
            isOn = !isOn;
            panel.classList.toggle('hidden', !isOn);
            toggle.classList.toggle('active', isOn);
            toggle.textContent = isOn ? 'Debug: ON' : 'Debug: OFF';
        });

        clearBtn.addEventListener('click', function() {
            logEl.innerHTML = '';
        });

        var origLog = console.log.bind(console);
        var origError = console.error.bind(console);
        var origWarn = console.warn.bind(console);

        console.log = function() {
            origLog.apply(console, arguments);
            addEntry('info', Array.from(arguments).join(' '));
        };
        console.error = function() {
            origError.apply(console, arguments);
            addEntry('error', Array.from(arguments).join(' '));
        };
        console.warn = function() {
            origWarn.apply(console, arguments);
            addEntry('warn', Array.from(arguments).join(' '));
        };

        window.addEventListener('error', function(e) {
            addEntry('error', 'Uncaught: ' + e.message + ' at ' + e.filename + ':' + e.lineno);
        });

        window.addEventListener('unhandledrejection', function(e) {
            addEntry('error', 'Promise rejected: ' + e.reason);
        });

        addEntry('info', 'Debug ready');
    })();
    </script>
</body>
</html>
